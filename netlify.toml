[build]
  command = "rm -rf .next && rm -rf node_modules/.cache && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXT_PUBLIC_APP_URL = "https://rinkify-system.netlify.app"
  NEXT_PUBLIC_API_URL = "https://rinkify-system.netlify.app"
  SMTP_HOST = "smtp.gmail.com"
  SMTP_PORT = "587"
  SMTP_SECURE = "false"
  SMTP_FROM = "Rankify <noreply@rankify.com.br>"
  NODE_ENV = "production"
  NEXT_PUBLIC_USE_SIMPLE_AUTH = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Configurações de função
[functions]
  directory = ".netlify/functions"
  node_bundler = "esbuild"

# Redirecionamentos
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
