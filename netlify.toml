[build]
command = "npm run build"
publish = ".next"

[build.environment]
NODE_VERSION = "20"
NODE_ENV = "production"

# URL da API
NEXT_PUBLIC_API_URL = "https://rinkifyfy-kbve.vercel.app"
NEXT_PUBLIC_APP_URL = "https://rinkifyfy-kbve.vercel.app"

# Configurações do banco de dados (SQLite)
DATABASE_URL = "file:./rankify.db"

# Segurança
NEXTAUTH_SECRET = "your-secret-key-here"
NEXTAUTH_URL = "https://rinkifyfy-kbve.vercel.app"

# Google OAuth
GOOGLE_CLIENT_ID = "your-google-client-id"
GOOGLE_CLIENT_SECRET = "your-google-client-secret"
GOOGLE_REDIRECT_URI = "https://rinkifyfy-kbve.vercel.app/google-callback"

# SMTP - Configurações do Gmail para envio de emails
SMTP_HOST = "smtp.gmail.com"
SMTP_PORT = "587"
SMTP_SECURE = "false"
SMTP_USER = "your-email@gmail.com"
SMTP_PASS = "your-app-password"
SMTP_FROM = "Rankify <noreply@rankify.com.br>"

# Password Security
PASSWORD_PEPPER = "your-pepper-key-here"

[[redirects]]
from = "/_next/image"
to = "/.netlify/images"
status = 200
query = { url = ":url", w = ":width", q = ":quality" }

[[redirects]]
from = "/_ipx/*"
to = "/.netlify/images"
status = 200
query = { url = ":url", w = ":width", q = ":quality" }

[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
