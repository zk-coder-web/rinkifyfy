[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXT_PUBLIC_APP_URL = "https://rkfy.netlify.app"
  NEXT_PUBLIC_API_URL = "https://rkfy.netlify.app"
  NEXT_PUBLIC_USE_SIMPLE_AUTH = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"
